<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1c1917" />
  <meta name="description" content="Agende seu horário online em poucos passos." />
  <title>Barbearia — Agendamento online</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icon-maskable.svg" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/booking.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

  <div id="view-home" class="view">
    <header class="site-header">
      <div class="brand">
        <img src="assets/logo.svg" alt="" width="34" height="34" />
        <span class="brand__name" data-bind-business-name></span>
      </div>
      <button type="button" class="btn btn--primary" data-start-booking>Agendar horário</button>
    </header>

    <section class="hero">
      <div class="container hero__content">
        <span class="hero__eyebrow">Barbearia</span>
        <h1 class="hero__title" data-bind-business-name></h1>
        <p class="hero__slogan" data-bind-slogan></p>
        <button type="button" class="btn btn--primary" data-start-booking>Agendar horário</button>
      </div>
    </section>

    <section class="section" id="servicos">
      <div class="container">
        <div class="section__header">
          <span class="section__eyebrow">O que oferecemos</span>
          <h2 class="section__title">Serviços</h2>
        </div>
        <div class="grid grid--services" id="services-grid"></div>
      </div>
    </section>

    <section class="section section--tint" id="equipe">
      <div class="container">
        <div class="section__header">
          <span class="section__eyebrow">Nossa equipe</span>
          <h2 class="section__title">Profissionais</h2>
        </div>
        <div class="grid grid--team" id="team-grid"></div>
      </div>
    </section>

    <section class="section" id="avaliacoes">
      <div class="container">
        <div class="section__header">
          <span class="section__eyebrow">Depoimentos</span>
          <h2 class="section__title">O que dizem nossos clientes</h2>
        </div>
        <div class="grid grid--reviews" id="reviews-grid"></div>
      </div>
    </section>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-grid">
          <div>
            <h3>Contato</h3>
            <p id="footer-address"></p>
            <p id="footer-phone"></p>
            <p id="footer-instagram"></p>
          </div>
          <div>
            <h3>Horário de funcionamento</h3>
            <ul id="footer-hours"></ul>
          </div>
          <div>
            <h3 data-bind-business-name></h3>
            <p data-bind-slogan></p>
          </div>
        </div>
        <div class="footer-bottom">
          <span>&copy; <span id="footer-year"></span> <span data-bind-business-name></span>. Todos os direitos reservados.</span>
          <span>Demonstração comercial — dados fictícios.</span>
        </div>
      </div>
    </footer>
  </div>

  <div id="view-booking" class="view booking-view" hidden>
    <div class="booking-shell">
      <div class="booking-topbar">
        <div class="brand">
          <img src="assets/logo.svg" alt="" width="28" height="28" />
          <span class="brand__name" data-bind-short-name></span>
        </div>
        <button type="button" class="btn btn--ghost" data-restart-home aria-label="Fechar agendamento">Fechar</button>
      </div>

      <div id="booking-progress"></div>
      <div id="step-content"></div>

      <div class="booking-nav" id="booking-nav">
        <button type="button" class="btn btn--ghost" id="nav-back">Voltar</button>
        <button type="button" class="btn btn--primary" id="nav-next">Continuar</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
